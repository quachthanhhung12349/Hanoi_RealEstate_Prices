name: CI

on:
  push:
    branches: [main, dev_branch]
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Import package
        env:
          PYTHONPATH: src
        run: |
          python -c "import hanoi_real_estate"
          python -c "from hanoi_real_estate import analytics, config, db, gis, repository"

      - name: Initialize SQLite test database
        env:
          PYTHONPATH: src
        run: |
          python scripts/init_db.py