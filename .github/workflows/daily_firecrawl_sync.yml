name: Daily Firecrawl Sync

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  daily-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run daily Firecrawl sync
        env:
          PYTHONPATH: src
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          FIRECRAWL_DAILY_MAX_NEW: "20"
          FIRECRAWL_DAILY_MAX_PAGES: "2"
          DAILY_DISCOVER_URL: "https://batdongsan.com.vn/ban-dat-ha-noi?cIds=41"
        run: |
          python scripts/daily_firecrawl_sync.py
